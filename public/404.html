<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting...</title>
    <script>
      (function () {
        var l = window.location
        var repoBase = '/Birthday'
        var path = l.pathname.replace(repoBase, '')
        var target = repoBase + '/#' + (path || '/lights') + l.search + l.hash
        window.location.replace(target)
      })()
    </script>
  </head>
  <body></body>
</html>
